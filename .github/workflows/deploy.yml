name: Deploy to Vercel (production)

# Auto-deploys on every push to main: runs the engine tests, then builds and
# ships to Vercel production. Needs three repo secrets (Settings → Secrets and
# variables → Actions): VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID.
# The app's runtime env (VITE_SUPABASE_URL / VITE_SUPABASE_ANON_KEY) is pulled
# from the Vercel project by `vercel pull`, so set those in the Vercel dashboard.
#
# NOTE: if you ALSO connect this repo under Vercel's Git integration, disable its
# auto-deploy (Project → Settings → Git) or you'll deploy twice per push.

on:
  push:
    branches: [main]
  workflow_dispatch: {} # lets you trigger a deploy manually from the Actions tab

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      # Check out WITHOUT pulling LFS blobs yet (we cache them below so we don't
      # re-download ~837MB of card art on every deploy — that would burn the free
      # LFS bandwidth quota fast). The working tree gets small pointer files here.
      - uses: actions/checkout@v4
        with:
          lfs: false

      - name: Cache Git LFS objects (card art)
        uses: actions/cache@v4
        with:
          path: .git/lfs
          # Re-keys only when the art actually changes (pointer contents change).
          key: lfs-${{ hashFiles('public/cards/*.png') }}
          restore-keys: lfs-

      - name: Materialize LFS files (from cache, or download on a miss)
        run: git lfs pull

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests (gate the deploy)
        run: npm test

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings + env (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (Vite, with pulled env)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt output to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
